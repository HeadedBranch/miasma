name: Checks

on:
  pull_request:
    branches: ["main"]
  workflow_call:

permissions:
  contents: read

jobs:
  Checks-and-Tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@v6

      - name: Validate Build
        run: cargo build

      - name: Check Formatting
        run: cargo fmt --check

      - name: Clippy!
        run: cargo clippy --no-deps --all-targets

      - name: Run Tests
        run: cargo test

      - name: Verify Publish-Ready
        run: cargo publish --dry-run

      - name: Test Docker Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail

          docker build -t miasma:test .

          container_id=$(docker run -d --rm \
            -p 9999:9999 \
            miasma:test \
            --poison-source https://example.com \
          )
          trap 'docker rm -f "$container_id"' EXIT

          sleep 5
          curl -fsS http://localhost:9999
