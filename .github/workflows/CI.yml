name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  Checks-and-Tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Build
        run: cargo build

      - name: Check Formatting
        run: cargo fmt --check

      - name: Clippy!
        run: cargo clippy --no-deps --all-targets

      - name: Run Tests
        run: cargo test
